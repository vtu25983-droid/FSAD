<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusHub - Sign Up / Sign In</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--dark); padding:1rem; }
    .auth-page-wrap { width:100%; max-width:480px; }

    .auth-logo { text-align:center; margin-bottom:2rem; }
    .auth-logo .icon { width:64px;height:64px;background:var(--gradient);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 0.75rem; }
    .auth-logo h1 { font-size:1.6rem;font-weight:800; }
  
    .auth-logo p { color:var(--text-muted);font-size:0.85rem;margin-top:4px; }

    .auth-card { background:var(--dark2);border:1px solid rgba(108,99,255,0.2);border-radius:20px;padding:2rem; }

    .tab-row { display:flex;background:rgba(255,255,255,0.04);border-radius:12px;padding:4px;margin-bottom:1.75rem; }
    .tab-btn { flex:1;padding:10px;border:none;background:none;color:var(--text-muted);font-size:0.92rem;font-weight:600;border-radius:9px;cursor:pointer;transition:all 0.2s; }
    .tab-btn.active { background:var(--gradient);color:white;box-shadow:0 4px 15px rgba(108,99,255,0.3); }

    .role-hint { display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:10px;margin-bottom:1.25rem;font-size:0.8rem;line-height:1.5; }
    .role-hint.admin { background:rgba(255,165,0,0.08);border:1px solid rgba(255,165,0,0.2);color:#ffb347; }
    .role-hint.user  { background:rgba(108,99,255,0.08);border:1px solid rgba(108,99,255,0.2);color:#a09aff; }
    .role-hint.detect { background:rgba(67,233,123,0.08);border:1px solid rgba(67,233,123,0.2);color:#43e97b; }

    .role-badge { display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:50px;font-size:0.72rem;font-weight:700;margin-left:8px;vertical-align:middle; }
    .badge-admin { background:rgba(255,165,0,0.15);color:orange; }
    .badge-user  { background:rgba(108,99,255,0.15);color:var(--primary); }

    .detected-role { display:none;margin-bottom:1rem;padding:10px 14px;border-radius:10px;font-size:0.82rem;font-weight:600;text-align:center; }
    .detected-role.show { display:block; }
    .detected-role.admin { background:rgba(255,165,0,0.1);border:1px solid rgba(255,165,0,0.25);color:orange; }
    .detected-role.user  { background:rgba(108,99,255,0.1);border:1px solid rgba(108,99,255,0.25);color:var(--primary); }

    .back-link { text-align:center;margin-top:1.25rem;font-size:0.85rem;color:var(--text-muted); }
    .back-link a { color:var(--primary);font-weight:600; }
  </style>
</head>
<body>

<div class="auth-page-wrap">
  <div class="auth-logo">
    <div class="icon">🎓</div>
    <h1><span>CampusHub</span></h1>
    <p>Academic Campus Event & Registration Portal</p>
  </div>

  <div class="auth-card">
    <!-- TABS -->
    <div class="tab-row">
      <button class="tab-btn active" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
      <button class="tab-btn" id="tabSignin" onclick="switchTab('signin')">Sign In</button>
    </div>

    <!-- WELCOME MSG -->
    <p id="roleInfo" style="text-align:center;color:var(--text-muted);font-size:0.88rem;margin-bottom:1.25rem;">
      Welcome to CampusHub 👋 Create your account to get started.
    </p>

    <!-- DETECTED ROLE (shows after typing email) -->
    <div class="detected-role" id="detectedRole"></div>

    <!-- ===== SIGN UP FORM ===== -->
    <form id="signupForm" style="display:block;">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="suName" placeholder="Your full name" required>
        </div>
        <div class="form-group">
          <label>Student ID</label>
          <input type="text" id="suStudentId" placeholder="e.g. CS2021001">
        </div>
      </div>
      <div class="form-group">
        <label>Email Address *</label>
        <input type="email" id="suEmail" placeholder="Enter your email ID" required oninput="detectRole(this.value,'signup')">
      </div>
      <div class="form-group" id="suDeptWrap">
        <label>Department</label>
        <select id="suDept">
          <option value="">Select Department</option>
          <option>Computer Science</option>
          <option>Electronics</option>
          <option>Mechanical</option>
          <option>Civil</option>
          <option>Business Administration</option>
          <option>Arts & Humanities</option>
          <option>Science</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Password *</label>
          <div class="password-wrap">
            <input type="password" id="suPassword" placeholder="Min 6 characters" required>
            <button type="button" class="toggle-pw">👁️</button>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm Password *</label>
          <div class="password-wrap">
            <input type="password" id="suPassword2" placeholder="Repeat password" required>
            <button type="button" class="toggle-pw">👁️</button>
          </div>
        </div>
      </div>
      <button type="submit" class="btn-submit" id="suBtn">Create Account →</button>
    </form>

    <!-- ===== SIGN IN FORM ===== -->
    <form id="signinForm" style="display:none;">
      <div class="form-group">
        <label>Email Address *</label>
        <input type="email" id="siEmail" placeholder="Enter your email ID" required oninput="detectRole(this.value,'signin')">
      </div>
      <div class="form-group">
        <label>Password *</label>
        <div class="password-wrap">
          <input type="password" id="siPassword" placeholder="Enter your password" required>
          <button type="button" class="toggle-pw">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn-submit" id="siBtn">Sign In →</button>
    </form>

    <div class="back-link">
      <a href="index.html">← Back to Portal</a>
    </div>
  </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script>
const API_BASE = 'http://localhost/campus-portal/php';

// If already logged in, redirect
if (localStorage.getItem('campusUser'))  window.location.href = 'events.html';
if (localStorage.getItem('campusAdmin')) window.location.href = 'admin.html';

// Check URL param for default tab
const urlTab = new URLSearchParams(window.location.search).get('tab');
if (urlTab === 'signin') switchTab('signin');

function switchTab(tab) {
  document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('signinForm').style.display = tab === 'signin' ? 'block' : 'none';
  document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
  document.getElementById('tabSignin').classList.toggle('active', tab === 'signin');
  document.getElementById('detectedRole').className = 'detected-role';
  const ri = document.getElementById('roleInfo');
  ri.style.display = 'block';
  ri.textContent = tab === 'signup'
    ? 'Welcome to CampusHub 👋 Create your account to get started.'
    : 'Welcome back 👋 Sign in to continue.';
}

function isAdminEmail(email) {
  return email.toLowerCase().endsWith('@campushub.com');
}

function detectRole(email, form) {
  const el = document.getElementById('detectedRole');
  const roleInfo = document.getElementById('roleInfo');
  if (!email || !email.includes('@')) {
    el.className = 'detected-role';
    roleInfo.style.display = 'block';
    return;
  }
  roleInfo.style.display = 'none';
  if (isAdminEmail(email)) {
    el.className = 'detected-role admin show';
    el.innerHTML = '🛡️ Admin account detected';
    if (form === 'signup') document.getElementById('suDeptWrap').style.display = 'none';
  } else {
    el.className = 'detected-role user show';
    el.innerHTML = '🎓 Student account detected';
    if (form === 'signup') document.getElementById('suDeptWrap').style.display = 'block';
  }
}

function showToast(msg, type='info') {
  const icons = {success:'✅', error:'❌', info:'ℹ️'};
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

// Password toggles
document.querySelectorAll('.toggle-pw').forEach(btn => {
  btn.addEventListener('click', () => {
    const inp = btn.previousElementSibling;
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
  });
});

// ===== SIGN UP =====
document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('suBtn');
  const email = document.getElementById('suEmail').value;
  const pw    = document.getElementById('suPassword').value;
  const pw2   = document.getElementById('suPassword2').value;

  if (pw !== pw2)   { showToast('Passwords do not match', 'error'); return; }
  if (pw.length < 6){ showToast('Password must be at least 6 characters', 'error'); return; }

  btn.textContent = 'Creating account...'; btn.disabled = true;

  try {
    const res = await fetch(`${API_BASE}/auth.php?action=signup`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        name:       document.getElementById('suName').value,
        email:      email,
        password:   pw,
        student_id: document.getElementById('suStudentId').value,
        department: document.getElementById('suDept').value,
        role:       isAdminEmail(email) ? 'admin' : 'user'
      })
    });
    const data = await res.json();
    if (data.success) {
      showToast('Account created! Please sign in.', 'success');
      // Switch to signin and pre-fill email
      switchTab('signin');
      setTimeout(() => {
        document.getElementById('siEmail').value = email;
        detectRole(email, 'signin');
      }, 100);
    } else {
      showToast(data.error, 'error');
    }
  } catch { showToast('Connection error. Is XAMPP running?', 'error'); }
  finally { btn.textContent = 'Create Account →'; btn.disabled = false; }
});

// ===== SIGN IN =====
document.getElementById('signinForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn   = document.getElementById('siBtn');
  const email = document.getElementById('siEmail').value;

  btn.textContent = 'Signing in...'; btn.disabled = true;

  try {
    // Admin login
    if (isAdminEmail(email)) {
      const res = await fetch(`${API_BASE}/auth.php?action=admin_login`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email, password: document.getElementById('siPassword').value })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('campusAdmin', JSON.stringify(data.admin));
        showToast('Welcome, Admin! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'admin.html', 800);
      } else {
        showToast(data.error, 'error');
        btn.textContent = 'Sign In →'; btn.disabled = false;
      }
    } else {
      // Student login
      const res = await fetch(`${API_BASE}/auth.php?action=signin`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email, password: document.getElementById('siPassword').value })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('campusUser', JSON.stringify(data.user));
        showToast(`Welcome, ${data.user.name}! Redirecting...`, 'success');
        setTimeout(() => window.location.href = 'events.html', 800);
      } else {
        showToast(data.error, 'error');
        btn.textContent = 'Sign In →'; btn.disabled = false;
      }
    }
  } catch {
    showToast('Connection error. Is XAMPP running?', 'error');
    btn.textContent = 'Sign In →'; btn.disabled = false;
  }
});
</script>
</body>
</html>
