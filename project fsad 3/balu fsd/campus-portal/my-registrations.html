<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Registrations - CampusHub</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .my-reg-card {
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      gap: 0;
      transition: var(--transition);
    }
    .my-reg-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: rgba(108,99,255,0.3); }
    .my-reg-img { width: 140px; min-height: 140px; object-fit: cover; flex-shrink: 0; }
    .my-reg-body { padding: 1.25rem; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
    .my-reg-body h3 { font-size: 1rem; font-weight: 700; color: white; margin-bottom: 0.4rem; }
    .my-reg-meta { display: flex; flex-wrap: wrap; gap: 10px; margin: 0.6rem 0; }
    .my-reg-meta span { font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
    .my-reg-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 0.75rem; flex-wrap: wrap; gap: 8px; }
    .reg-id-badge { font-size: 0.75rem; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 3px 10px; border-radius: 50px; }
    .status-badge { font-size: 0.75rem; font-weight: 700; padding: 4px 12px; border-radius: 50px; }
    .status-upcoming { background: rgba(108,99,255,0.15); color: var(--primary); }
    .status-today    { background: rgba(67,233,123,0.15); color: #43e97b; }
    .status-past     { background: rgba(255,255,255,0.06); color: var(--text-muted); }
    .empty-wrap { text-align: center; padding: 5rem 2rem; }
    .empty-wrap .big-icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.5; }
    .empty-wrap h2 { font-size: 1.3rem; margin-bottom: 0.5rem; }
    .empty-wrap p { color: var(--text-muted); margin-bottom: 1.5rem; }
    .stats-row { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .mini-stat { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 12px; flex: 1; min-width: 140px; }
    .mini-stat .num { font-size: 1.6rem; font-weight: 800; }
    .mini-stat .lbl { font-size: 0.78rem; color: var(--text-muted); }
    @media(max-width:600px){ .my-reg-img{display:none;} }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-brand">
    <div class="logo-icon">🎓</div>
    <span>CampusHub</span>
  </div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="events.html">Events</a></li>
    <li><a href="my-registrations.html" class="active">My Registrations</a></li>
  </ul>
  <div style="display:flex;align-items:center;gap:10px;" id="authNavWrap"></div>
  <div class="hamburger"><span></span><span></span><span></span></div>
</nav>

<!-- PAGE HEADER -->
<div style="padding:100px 2rem 2.5rem;background:var(--dark2);text-align:center;">
  <div class="section-tag">My Account</div>
  <h1 style="font-size:2.2rem;font-weight:800;margin-bottom:0.5rem;">
    My <span style="background:var(--gradient);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">Registrations</span>
  </h1>
  <p style="color:var(--text-muted);">All the events you have registered for</p>
</div>

<!-- CONTENT -->
<section class="section" style="max-width:900px;margin:0 auto;">

  <!-- STATS -->
  <div class="stats-row" id="statsRow" style="display:none;">
    <div class="mini-stat">
      <div style="font-size:1.5rem;">📝</div>
      <div><div class="num" id="totalCount">0</div><div class="lbl">Total Registered</div></div>
    </div>
    <div class="mini-stat">
      <div style="font-size:1.5rem;">🔜</div>
      <div><div class="num" id="upcomingCount">0</div><div class="lbl">Upcoming</div></div>
    </div>
    <div class="mini-stat">
      <div style="font-size:1.5rem;">✅</div>
      <div><div class="num" id="pastCount">0</div><div class="lbl">Completed</div></div>
    </div>
  </div>

  <!-- FILTER -->
  <div class="filter-bar" id="filterBar" style="display:none;justify-content:flex-start;margin-bottom:1.5rem;">
    <button class="filter-btn active" data-filter="all"    onclick="filterRegs('all',this)">All</button>
    <button class="filter-btn"        data-filter="upcoming" onclick="filterRegs('upcoming',this)">🔜 Upcoming</button>
    <button class="filter-btn"        data-filter="past"   onclick="filterRegs('past',this)">✅ Past</button>
  </div>

  <!-- LIST -->
  <div id="regsList">
    <div class="loading"><div class="spinner"></div><p>Loading your registrations...</p></div>
  </div>

</section>

<!-- FOOTER -->
<footer>
  <div class="footer-content">
    <div class="footer-brand">🎓 <span>CampusHub</span></div>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="events.html">Events</a>
    </div>
    <p class="footer-copy">© 2026 CampusHub</p>
  </div>
</footer>

<div id="toastContainer" class="toast-container"></div>
<script src="js/main.js"></script>
<script>
  let allMyRegs = [];

  async function loadMyRegistrations() {
    const user = JSON.parse(localStorage.getItem('campusUser') || 'null');
    if (!user) {
      window.location.href = 'auth.html?tab=signin';
      return;
    }

    try {
      const res  = await fetch(`${API_BASE}/get_my_registrations.php?email=${encodeURIComponent(user.email)}`);
      const data = await res.json();

      if (!data.success) { showToast(data.error, 'error'); return; }

      allMyRegs = data.registrations;
      renderStats(allMyRegs);
      renderRegs(allMyRegs);

      if (allMyRegs.length > 0) {
        document.getElementById('statsRow').style.display  = 'flex';
        document.getElementById('filterBar').style.display = 'flex';
      }
    } catch(e) {
      document.getElementById('regsList').innerHTML = `
        <div class="empty-wrap">
          <div class="big-icon">⚠️</div>
          <h2>Could not load registrations</h2>
          <p>Make sure XAMPP is running.</p>
        </div>`;
    }
  }

  function renderStats(regs) {
    const today    = new Date().toISOString().split('T')[0];
    const upcoming = regs.filter(r => r.date >= today).length;
    const past     = regs.filter(r => r.date <  today).length;
    document.getElementById('totalCount').textContent    = regs.length;
    document.getElementById('upcomingCount').textContent = upcoming;
    document.getElementById('pastCount').textContent     = past;
  }

  function getStatus(dateStr) {
    const today     = new Date().toISOString().split('T')[0];
    const eventDate = dateStr.split('T')[0];
    if (eventDate === today)  return { label: '🟢 Today!',   cls: 'status-today' };
    if (eventDate >  today)   return { label: '🔜 Upcoming', cls: 'status-upcoming' };
    return                           { label: '✅ Completed', cls: 'status-past' };
  }

  function formatDate(d) {
    return new Date(d).toLocaleDateString('en-US', { weekday:'short', year:'numeric', month:'short', day:'numeric' });
  }
  function formatTime(t) {
    if (!t) return '';
    const [h, m] = t.split(':');
    const dt = new Date(); dt.setHours(h, m);
    return dt.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
  }

  function renderRegs(regs) {
    const list = document.getElementById('regsList');
    if (!regs.length) {
      list.innerHTML = `
        <div class="empty-wrap">
          <div class="big-icon">📭</div>
          <h2>No registrations found</h2>
          <p>You haven't registered for any events yet.</p>
          <a href="events.html" class="btn-primary" style="display:inline-block;padding:12px 28px;border-radius:12px;text-decoration:none;color:white;">Browse Events →</a>
        </div>`;
      return;
    }

    list.innerHTML = regs.map(r => {
      const status  = getStatus(r.date);
      const catCls  = { Technology:'badge-technology', Cultural:'badge-cultural', Competition:'badge-competition', Career:'badge-career', Academic:'badge-academic', Sports:'badge-sports' };
      const regDate = new Date(r.registered_at).toLocaleDateString('en-US', { day:'numeric', month:'short', year:'numeric' });
      return `
        <div class="my-reg-card" style="margin-bottom:1rem;">
          <img class="my-reg-img" src="${r.image_url || 'https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=300'}"
               alt="${r.title}" onerror="this.src='https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=300'">
          <div class="my-reg-body">
            <div>
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
                <span class="event-category-badge ${catCls[r.category]||''}" style="position:static;">${r.category}</span>
                <span class="status-badge ${status.cls}">${status.label}</span>
              </div>
              <h3>${r.title}</h3>
              <div class="my-reg-meta">
                <span>📅 ${formatDate(r.date)}</span>
                <span>🕐 ${formatTime(r.time)}</span>
                <span>📍 ${r.venue}</span>
              </div>
            </div>
            <div class="my-reg-footer">
              <span class="reg-id-badge">Registration #${r.id} &bull; Registered on ${regDate}</span>
              <span style="font-size:0.78rem;color:var(--text-muted);">👥 ${r.registered_count}/${r.capacity} registered</span>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function filterRegs(type, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const today = new Date().toISOString().split('T')[0];
    if (type === 'all')      renderRegs(allMyRegs);
    if (type === 'upcoming') renderRegs(allMyRegs.filter(r => r.date >= today));
    if (type === 'past')     renderRegs(allMyRegs.filter(r => r.date <  today));
  }

  document.addEventListener('DOMContentLoaded', loadMyRegistrations);
</script>
</body>
</html>
