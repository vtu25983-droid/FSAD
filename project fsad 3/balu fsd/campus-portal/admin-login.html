<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - CampusHub</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--dark); }
    .login-wrap { width:100%; max-width:420px; padding:1rem; }
    .login-card { background:var(--dark2); border:1px solid rgba(108,99,255,0.2); border-radius:20px; padding:2.5rem; }
    .login-logo { text-align:center; margin-bottom:2rem; }
    .login-logo .icon { width:60px;height:60px;background:var(--gradient);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 0.75rem; }
    .login-logo h1 { font-size:1.4rem;font-weight:800; }
    .login-logo h1 span { background:var(--gradient);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent; }
    .login-logo p { color:var(--text-muted);font-size:0.85rem;margin-top:4px; }
    .admin-badge { display:inline-flex;align-items:center;gap:6px;background:rgba(255,165,0,0.1);border:1px solid rgba(255,165,0,0.25);color:orange;padding:4px 14px;border-radius:50px;font-size:0.78rem;font-weight:600;margin-bottom:1.5rem; }
    .back-link { text-align:center;margin-top:1.25rem;font-size:0.85rem;color:var(--text-muted); }
    .back-link a { color:var(--primary); }
    .hint-box { background:rgba(108,99,255,0.08);border:1px solid rgba(108,99,255,0.15);border-radius:10px;padding:10px 14px;margin-bottom:1.25rem;font-size:0.8rem;color:var(--text-muted);line-height:1.6; }
    .hint-box strong { color:var(--primary); }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">🛡️</div>
      <h1><span>CampusHub</span> Admin</h1>
      <p>Restricted access — administrators only</p>
    </div>

    <div style="text-align:center;margin-bottom:1.5rem;">
      <span class="admin-badge">🔐 Admin Portal</span>
    </div>

    <div class="hint-box">
      Default credentials:<br>
      <strong>Email:</strong> admin@campushub.com<br>
      <strong>Password:</strong> admin@123
    </div>

    <form id="adminLoginForm">
      <div class="form-group">
        <label>Admin Email</label>
        <input type="email" id="adminEmail" placeholder="admin@campushub.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" id="adminPassword" placeholder="Enter admin password" required>
          <button type="button" class="toggle-pw">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn-submit" style="margin-top:0.5rem;">Login to Admin Panel 🛡️</button>
    </form>

    <div class="back-link">
      Not an admin? <a href="index.html">Go to Portal →</a>
    </div>
  </div>
</div>

<div id="toastContainer" class="toast-container"></div>
<script>
  const API_BASE = 'http://localhost/campus-portal/php';

  // Redirect if already logged in as admin
  if (localStorage.getItem('campusAdmin')) {
    window.location.href = 'admin.html';
  }

  function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const icons = { success:'✅', error:'❌', info:'ℹ️' };
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `<span>${icons[type]}</span><span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
  }

  // Password toggle
  document.querySelector('.toggle-pw').addEventListener('click', function() {
    const input = this.previousElementSibling;
    input.type = input.type === 'password' ? 'text' : 'password';
    this.textContent = input.type === 'password' ? '👁️' : '🙈';
  });

  document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('.btn-submit');
    btn.textContent = 'Verifying...'; btn.disabled = true;

    try {
      const res = await fetch(`${API_BASE}/auth.php?action=admin_login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('adminEmail').value,
          password: document.getElementById('adminPassword').value
        })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('campusAdmin', JSON.stringify(data.admin));
        showToast(data.message, 'success');
        setTimeout(() => window.location.href = 'admin.html', 800);
      } else {
        showToast(data.error, 'error');
        btn.textContent = 'Login to Admin Panel 🛡️'; btn.disabled = false;
      }
    } catch {
      showToast('Connection error. Is XAMPP running?', 'error');
      btn.textContent = 'Login to Admin Panel 🛡️'; btn.disabled = false;
    }
  });
</script>
</body>
</html>
